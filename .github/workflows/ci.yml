# DEVOPS_AGENT | 2026-05-10 | CI pipeline: lint → typecheck → test → docker build
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: cd backend && ruff check app/ tests/

      - name: Type check (mypy)
        run: cd backend && mypy app/ --ignore-missing-imports

      - name: Run tests
        run: cd backend && pytest tests/ -v --cov=app --cov-report=xml
        env:
          ANTHROPIC_API_KEY: "test-key-not-real"
          DATABASE_URL: "sqlite+aiosqlite:///./data/test.db"
          JWT_PRIVATE_KEY_PATH: "./keys/private.pem"
          JWT_PUBLIC_KEY_PATH: "./keys/public.pem"
          OUTPUT_DIR: "./output_test"

      - uses: codecov/codecov-action@v4
        if: always()

  frontend:
    name: Frontend (typecheck + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run typecheck

      - name: Lint
        run: cd frontend && npm run lint

      - name: Run tests
        run: cd frontend && npm test

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t orchestrator-backend ./backend

      - name: Build frontend image
        run: docker build -t orchestrator-frontend ./frontend
