# ─── TaskFlow Production Overrides ───────────────────────────────────────────
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# In production, secrets MUST come from your secret manager
# (AWS Secrets Manager, Railway secrets, Vault, etc.)
# Never commit a populated .env.production file.

version: "3.9"

name: taskflow-prod

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # In production: use managed database (RDS, Railway Postgres, Supabase)
    # Remove the ports block so DB is not exposed to the internet
    ports: []
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    # In production: use managed Redis (ElastiCache, Railway Redis, Upstash)
    ports: []
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
      target: runner   # Use production runner stage
    restart: always
    # No volume mounts in production
    volumes: []
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: "true"
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      LOG_LEVEL: info
    # Don't expose directly — goes through nginx
    ports: []
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      target: runner   # nginx static server
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    restart: always
    volumes: []
    ports: []
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128m

  nginx:
    image: nginx:1.27-alpine
    container_name: taskflow-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 64m
    networks:
      - taskflow-network

  # MinIO not included in prod — use AWS S3 directly

volumes:
  certbot_www:
  certbot_conf:
  postgres_data:
  redis_data:
